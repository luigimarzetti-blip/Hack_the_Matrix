name: Compila APK Matrix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installa Dipendenze Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-pip ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev unzip zip

      - name: Installa Buildozer
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user buildozer cython==0.29.33 virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Compilazione
        run: |
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.daemon=false"
          buildozer -v android debug
          
      - name: Salva APK
        uses: actions/upload-artifact@v4
        with:
          name: Matrix_PassGen_APK
          path: bin/*.apk
